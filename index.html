<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Painel Premium</title>

<style>
  :root {
    color-scheme: dark;
    --bg: #0b1020;
    --bg2: #11182b;
    --panel: #151b2c;
    --panel-2: #0f1423;
    --line: #283047;
    --text: #f4f7ff;
    --muted: #a7b1c7;
    --primary: linear-gradient(90deg, #0072b1 0%, #58a6ff 100%);
    --shadow: 0 18px 45px rgba(0,0,0,.35);
    --radius: 18px;
    --sidebar-w: 280px;
    --app-height: 100vh;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    margin:0;
    min-height: 100vh;
    height: var(--app-height);
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
    background:
    radial-gradient(circle at top, rgba(88,166,255,.16), transparent 32%),
    radial-gradient(circle at bottom, rgba(0,114,177,.10), transparent 30%),
    linear-gradient(180deg,var(--bg),var(--bg2));
    color: var(--text);
  }

  .app {
    height: var(--app-height);
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    overflow: hidden;
  }

  .sidebar {
    position: relative;
    background:
        radial-gradient(circle at top, rgba(88,166,255,.16), transparent 32%),
        radial-gradient(circle at bottom, rgba(0,114,177,.10), transparent 30%),
        linear-gradient(180deg,var(--bg),var(--bg2));
    border-right: 1px solid var(--line);
    backdrop-filter: blur(12px);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    z-index: 20;
    overflow-y: auto;
    overflow-x: hidden;
    height: calc(var(--app-height) - 60px - var(--safe-top) - var(--safe-bottom));
  }

  .sidebar.open {
      transform: translateX(0);
    }

  .sidebar::-webkit-scrollbar {
    width: 6px;
  }

  .sidebar::-webkit-scrollbar-thumb {
    background: rgba(88,166,255,.35);
    border-radius: 6px;
  }

  .brand {
    padding: 8px 4px 14px;
    border-bottom: 1px solid var(--line);
  }

  .brand h1 {
    margin: 0;
    font-size: 20px;
    line-height: 1.2;
  }

  .brand p {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .nav {
    display: grid;
    gap: 8px;
  }

  .nav-btn,
  .nav-btn:link,
  .nav-btn:visited,
  .nav-btn:hover,
  .nav-btn:active {
    text-decoration: none;
    color: #dbe6ff;
  }

  .nav-section{
  margin: 10px 0 8px;
  padding: 0 8px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-section::after{
  content:"";
  flex:1;
  height:1px;
  background:linear-gradient(90deg,
    rgba(255,255,255,0.15),
    rgba(255,255,255,0.03)
  );
}

  .nav-btn {
    width: 100%;
    height: 52px;
    padding: 0 10px 0 4px;
    display: grid;
    grid-template-columns: 40px 1fr 14px;
    align-items: center;
    gap: 8px;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(18,24,42,0.95), rgba(14,20,36,0.98));
    border: 1px solid var(--line);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      inset 0 -1px 0 rgba(0,0,0,0.0,05); 
    color: #dbe6ff;
  }

  .nav-btn:hover {
    transform: translateY(-1px);
    border-color: #4e79b0;
    background: linear-gradient(180deg, rgba(22,31,56,0.98), rgba(16,24,43,1));
    box-shadow: inset 0 0 0 1px rgba(88,166,255,.15);
  }

  .nav-btn.active {
    background: linear-gradient(180deg, rgba(88,166,255,.16), rgba(88,166,255,.06));
    border-color: #4e79b0;
    box-shadow: inset 0 0 0 1px rgba(88,166,255,.15);
  }

  .nav-btn strong {
    margin: 0;
    display: block;
    font-size: 15px;
    line-height: 1.2;
  }

  .nav-btn span {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.4;
  }

  .nav-btn-main {
    display: flex;
    align-items: center;
    height: 100%;
  }

  .nav-icon {
    width: 42px;
    height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border: 1px solid rgba(255,255,255,.06);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
  }

  .nav-icon svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.9;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .nav-arrow {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    width: 14px;
    height: 14px;
    color: rgba(255,255,255,0.5);
  }

  .nav-arrow svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .nav-btn:hover .nav-arrow,
  .nav-btn.active .nav-arrow {
    color: #dceaff;
    transform: translateX(2px);
  }

  .sidebar-foot {
    margin-top: auto;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
    padding: 10px 0 0;
    text-align: center;
    border-top: 1px solid var(--line);
  }

  .main {
    min-width: 0;
    min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 15;
    background:
        linear-gradient(180deg,var(--bg),var(--bg2));
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: calc(14px + var(--safe-top)) calc(18px + var(--safe-right)) 14px calc(18px + var(--safe-left));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .menu-toggle {
    display: none;
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: #fff;
    cursor: pointer;
  }

  .title-wrap {
    min-width: 0;
  }

  .title-wrap h2 {
    margin: 0;
    font-size: 18px;
  }

  .title-wrap p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 11px;
    white-space: wrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .top-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: nowrap;
  }

  .ghost-btn {
    border: 1px solid var(--line);
    background: var(--panel);
    color: #fff;
    border-radius: 12px;
    padding: 10px 14px;
    cursor: pointer;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
  }

  .viewer {
    min-height: 0;
    overflow: hidden;
    background: transparent !important;
    padding: 8px 12px calc(16px + var(--safe-bottom));
  }

  .frame-shell {
    height: 100%;
    min-height: 0;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 0;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: transparent;
  }

  .overlay {
    display: none;
  }

  @media (max-width: 90000px) {
    .app {
      grid-template-columns: 1fr;
    }

    .menu-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: min(84vw, 320px);
      height: auto;
      transform: translateX(-100%);
      transition: transform .22s ease;
      box-shadow: 0 25px 60px rgba(0,0,0,.45);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .overlay {
      display: block;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 19;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .viewer {
      min-height: 0;
      overflow: hidden;
      background: transparent !important;
      padding: 8px 8px calc(18px + var(--safe-bottom));
    }

    .frame-shell {
      height: 100%;
      min-height: 0;
      border-radius: 16px;
    }

    .topbar {
      padding: calc(12px + var(--safe-top)) calc(12px + var(--safe-right)) 12px calc(12px + var(--safe-left));
    }

    .title-wrap h2 {
      font-size: 16px;
    }

  .auth-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
      radial-gradient(circle at top, rgba(88,166,255,.18), transparent 32%),

  .auth-screen.hidden {

  }

  .auth-card {
    width: min(100%, 420px);
    background: rgba(21,27,44,.94);
    border: 1px solid var(--line);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 24px;
  }

  .auth-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(88,166,255,.08);
    border: 1px solid rgba(88,166,255,.18);
    margin-bottom: 18px;
    font-size: 12px;
    color: #dceaff;
  }

  .auth-card h2 {

    font-size: 28px;
    line-height: 1.15;
  }

  .auth-card p {
    margin: 0 0 22px;

    line-height: 1.5;
    font-size: 14px;
  }

  .auth-form {
    display: grid;
    gap: 14px;
  }

  .auth-field {
    display: grid;
    gap: 8px;
  }

  .auth-field label {
    font-size: 13px;
    color: #dceaff;
    font-weight: 700;
  }

  .auth-field input {
    width: 100%;
    border: 1px solid var(--line);
    outline: none;
    background: rgba(255,255,255,.04);
    color: var(--text);
    border-radius: 14px;
    padding: 14px 15px;
    font-size: 14px;
    transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
  }

  .auth-field input:focus {
    border-color: #58a6ff;
    box-shadow: 0 0 0 4px rgba(88,166,255,.12);
    background: rgba(255,255,255,.06);
  }

  .auth-submit {
    border: 0;
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    background: var(--primary);
    box-shadow: 0 14px 30px rgba(0,114,177,.22);
  }

  .auth-error {
    display: none;
    margin: 4px 0 0;
    padding: 12px 14px;
    border-radius: 14px;
    background: rgba(255, 77, 109, .10);
    border: 1px solid rgba(255, 77, 109, .18);
    color: #ffd2dc;
    font-size: 13px;
  }

  .auth-error.show {
    display: block;
  }

  .auth-hint {
    margin-top: 16px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.45;
  }

  .app-shell {
    height: 100vh;
  }

</style>
</head>

<script>


const AUTH_CONFIG_STORAGE_KEY = "painel_auth_config_base64";
const DEFAULT_AUTH_CONFIG_BASE64 = "eyJzdG9yYWdlVXNlcktleSI6InBhaW5lbF91c2VyIiwic2Vzc2lvbktleSI6InBhaW5lbF9hdXRoX3Nlc3Npb25fdjIiLCJ1c2VycyI6W3sidXNlcm5hbWUiOiJBZG1pbiIsInBhc3N3b3JkSGFzaCI6IjMxNzM3ZjQ5ODg0NmVkNDM2NDEwNmViZjIwOWI1ZTllODQ5ZDM4NWZiYzRlMjQ1MTNlOTI0ZjkxOTc1ODRjOTUifV19";
let AUTH_CONFIG_BASE64 = "";

function encodeBase64Utf8(value) {
  try {
    return btoa(unescape(encodeURIComponent(String(value))));
  } catch (err) {
    return btoa(String(value));
  }
}

function parseAuthConfigBase64(value) {
  try {
    const parsed = JSON.parse(decodeBase64Utf8(String(value || "")));
    if (!parsed || typeof parsed !== "object") throw new Error("AUTH_CONFIG inválido.");
    if (!parsed.storageUserKey) parsed.storageUserKey = "painel_user";
    if (!parsed.sessionKey) parsed.sessionKey = "painel_auth_session_v2";
    if (!Array.isArray(parsed.users)) parsed.users = [];
    return parsed;
  } catch (err) {
    return JSON.parse(decodeBase64Utf8(DEFAULT_AUTH_CONFIG_BASE64));
  }
}

function loadAuthConfig() {
  AUTH_CONFIG_BASE64 = safeGetStorage(AUTH_CONFIG_STORAGE_KEY) || DEFAULT_AUTH_CONFIG_BASE64;
  const config = parseAuthConfigBase64(AUTH_CONFIG_BASE64);
  AUTH_CONFIG_BASE64 = encodeBase64Utf8(JSON.stringify(config));
  safeSetStorage(AUTH_CONFIG_STORAGE_KEY, AUTH_CONFIG_BASE64);
  return config;
}

function persistAuthConfig() {
  AUTH_CONFIG_BASE64 = encodeBase64Utf8(JSON.stringify(AUTH_CONFIG));
  safeSetStorage(AUTH_CONFIG_STORAGE_KEY, AUTH_CONFIG_BASE64);
  return AUTH_CONFIG_BASE64;
}

function safeSetStorage(key, value) {
  try {
    localStorage.setItem(key, value);
    return true;
  } catch (err) {
    return false;
  }
}

function safeGetStorage(key) {
  try {
    return localStorage.getItem(key);
  } catch (err) {
    return null;
  }
}

function safeRemoveStorage(key) {
  try {
    localStorage.removeItem(key);
  } catch (err) {}
}

function clearLegacyRuntimeOverrides() {
  try {
    localStorage.removeItem("painel_runtime_override_html_v1");
    localStorage.removeItem("painel_runtime_override_html_disabled");
    localStorage.removeItem("painel_runtime_override_html_v3");
    sessionStorage.removeItem("__painel_runtime_loading_override__");
  } catch (err) {}
}

clearLegacyRuntimeOverrides();

function normalizeUser(value) {
  return String(value || "").trim().toLowerCase();
}

function encodeToken(data) {
  try {
    return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  } catch (err) {
    return "";
  }
}

function decodeToken(value) {
  try {
    return JSON.parse(decodeURIComponent(escape(atob(value))));
  } catch (err) {
    return null;
  }
}

async function hashText(value) {
  const buffer = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(String(value)));
  return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function findUser(username) {
  const normalized = normalizeUser(username);
  return AUTH_CONFIG.users.find(user => normalizeUser(user.username) === normalized) || null;
}

async function validateCredentials(username, password) {
  const user = findUser(username);
  if (!user) return null;

  const passwordHash = await hashText(password);
  if (passwordHash !== user.passwordHash) return null;

  return user;
}

async function createSessionToken(username) {
  const user = findUser(username);
  if (!user) return "";

  const verifier = await hashText(`${normalizeUser(user.username)}::${user.passwordHash}::painel-premium`);
  return encodeToken({
    u: user.username,
    v: verifier,
    t: Date.now()
  });
}

async function isAuthenticated() {
  const token = safeGetStorage(AUTH_CONFIG.sessionKey);
  if (!token) return false;

  const data = decodeToken(token);
  if (!data || !data.u || !data.v) return false;

  const user = findUser(data.u);
  if (!user) return false;

  const expected = await hashText(`${normalizeUser(user.username)}::${user.passwordHash}::painel-premium`);
  return data.v === expected;
}

async function saveSession(username) {
  const token = await createSessionToken(username);
  if (token) {
    safeSetStorage(AUTH_CONFIG.sessionKey, token);
  }
}

function clearSession() {
  safeRemoveStorage(AUTH_CONFIG.sessionKey);
}

function preloadSavedUser() {
  const savedUser = safeGetStorage(AUTH_CONFIG.storageUserKey);
  if (savedUser) {
    loginUser.value = savedUser;
  }
}

function showPanel() {
  authScreen.classList.add("hidden");
  appShell.hidden = false;
}

function showLogin() {
  appShell.hidden = true;
  authScreen.classList.remove("hidden");
}

function decodeBase64Utf8(value) {
  try {
    if (typeof TextDecoder !== "undefined") {
      const bytes = Uint8Array.from(atob(value), ch => ch.charCodeAt(0));
      return new TextDecoder("utf-8").decode(bytes);
    }
  } catch (err) {
    console.warn("Falha ao decodificar layout em UTF-8.", err);
  }

  try {
    return decodeURIComponent(escape(atob(value)));
  } catch (err) {
    return atob(value);
  }
}

const GITHUB_PANEL_STORAGE_KEY = "painel_github_config_v1";
const GITHUB_LAST_BACKUP_STORAGE_KEY = "painel_last_github_backup_v1";
const PANEL_RUNTIME_OVERRIDE_HTML_KEY = "painel_runtime_override_html_disabled";
const PANEL_VERSION_STORAGE_KEY = "painel_version_semver_v1";

function sanitizePanelVersion(value) {
  const match = String(value || "").trim().match(/^(\d+)\.(\d+)\.(\d+)$/);
  if (!match) return "1.0.0";
  const major = Math.max(0, parseInt(match[1], 10) || 0);
  const minor = Math.max(0, parseInt(match[2], 10) || 0);
  const patch = Math.max(0, parseInt(match[3], 10) || 0);
  return `${major}.${minor}.${patch}`;
}

function getPanelVersion() {
  const current = sanitizePanelVersion(safeGetStorage(PANEL_VERSION_STORAGE_KEY) || "1.0.0");
  safeSetStorage(PANEL_VERSION_STORAGE_KEY, current);
  return current;
}

function setPanelVersion(version) {
  const clean = sanitizePanelVersion(version);
  safeSetStorage(PANEL_VERSION_STORAGE_KEY, clean);
  updatePanelVersionLabel(clean);
  return clean;
}

function bumpPanelVersion() {
  const parts = getPanelVersion().split(".").map(n => parseInt(n, 10) || 0);
  let [major, minor, patch] = parts;

  if (patch < 10) {
    patch += 1;
  } else {
    patch = 0;
    if (minor < 10) {
      minor += 1;
    } else {
      minor = 0;
      major += 1;
    }
  }

  return setPanelVersion(`${major}.${minor}.${patch}`);
}

function updatePanelVersionLabel(version) {
  const label = document.getElementById("panelVersionLabel");
  if (label) label.textContent = `Painel v${sanitizePanelVersion(version || getPanelVersion())}`;
}


function getGithubConfig() {
  try { return JSON.parse(localStorage.getItem(GITHUB_PANEL_STORAGE_KEY) || "{}") || {}; }
  catch (err) { return {}; }
}

function saveGithubConfig(config) {
  const next = {
    token: String(config && config.token || "").trim(),
    owner: String(config && config.owner || "").trim(),
    repo: String(config && config.repo || "").trim(),
    branch: String(config && config.branch || "main").trim() || "main",
    path: String(config && config.path || "backup/backup-painel.json").trim() || "backup/backup-painel.json"
  };
  safeSetStorage(GITHUB_PANEL_STORAGE_KEY, JSON.stringify(next));
  return next;
}

function getGithubConfigBackup() {
  return {
    type: "painel-premium-github-config-backup",
    version: 1,
    createdAt: new Date().toISOString(),
    config: getGithubConfig()
  };
}

function applyGithubConfigBackup(payload) {
  if (!payload || typeof payload !== "object") {
    throw new Error("Backup do GitHub inválido.");
  }
  const config = payload.config && typeof payload.config === "object" ? payload.config : payload;
  saveGithubConfig(config);
  return getGithubConfig();
}

function downloadLocalJsonFile(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function pickLocalJsonFile() {
  return new Promise((resolve, reject) => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json,application/json";
    input.style.display = "none";
    document.body.appendChild(input);

    const cleanup = () => {
      try { input.remove(); } catch (err) {}
    };

    input.addEventListener("change", () => {
      const file = input.files && input.files[0];
      if (!file) {
        cleanup();
        reject(new Error("Nenhum arquivo selecionado."));
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        cleanup();
        try {
          resolve(JSON.parse(String(reader.result || "{}")));
        } catch (err) {
          reject(new Error("JSON inválido."));
        }
      };
      reader.onerror = () => {
        cleanup();
        reject(new Error("Não foi possível ler o arquivo."));
      };
      reader.readAsText(file, "UTF-8");
    }, { once: true });

    input.click();
  });
}

async function githubApiRequest(options) {
  const token = String(options && options.token || "").trim();
  const owner = String(options && options.owner || "").trim();
  const repo = String(options && options.repo || "").trim();
  const branch = String(options && options.branch || "main").trim() || "main";
  const path = String(options && options.path || "").trim().replace(/^\/+/, "");
  if (!token || !owner || !repo || !path) throw new Error("Preencha token, owner, repositório e caminho do GitHub.");

  const apiUrl = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${path.split("/").map(encodeURIComponent).join("/")}`;
  const headers = {
    "Accept": "application/vnd.github+json",
    "Authorization": `Bearer ${token}`,
    "X-GitHub-Api-Version": "2022-11-28"
  };

  if ((options && options.method || "GET").toUpperCase() === "GET") {
    const response = await fetch(`${apiUrl}?ref=${encodeURIComponent(branch)}`, { method: "GET", headers, cache: "no-store" });
    const data = await response.json();
    if (!response.ok) throw new Error((data && (data.message || data.error)) || "Falha ao buscar arquivo no GitHub.");
    return data;
  }

  let sha = "";
  try {
    const current = await githubApiRequest({ token, owner, repo, branch, path, method: "GET" });
    sha = current && current.sha ? current.sha : "";
  } catch (err) {}

  const response = await fetch(apiUrl, {
    method: "PUT",
    headers,
    body: JSON.stringify({
      message: options && options.message || `Atualiza ${path}`,
      content: btoa(unescape(encodeURIComponent(String(options && options.rawContent || "")))),
      branch,
      ...(sha ? { sha } : {})
    })
  });
  const data = await response.json();
  if (!response.ok) throw new Error((data && (data.message || data.error)) || "Falha ao salvar arquivo no GitHub.");
  return data;
}

function getGithubBasePath(config) {
  const github = config || getGithubConfig();
  const rawPath = String(github && github.path || "backup/backup-painel.json").trim() || "backup/backup-painel.json";
  if (/\.json$/i.test(rawPath)) {
    const parts = rawPath.split("/");
    parts.pop();
    return parts.join("/").replace(/^\/+|\/+$/g, "") || "backup";
  }
  return rawPath.replace(/^\/+|\/+$/g, "") || "backup";
}

function resolveGithubPathForTarget(target, config) {
  const basePath = getGithubBasePath(config);
  const filenames = { panel: "backup-painel.json", protecao: "backup-protecao.json", editor: "backup-editor-layout.json", siteapk: "backup-site-apk.json" };
  const safeTarget = filenames[target] ? target : "panel";
  return `${basePath}/${filenames[safeTarget]}`;
}

function hasGithubConfig(config) {
  const github = config || getGithubConfig();
  return !!(github && github.token && github.owner && github.repo && String(github.path || "").trim());
}

async function exportBackupToGithub(config) {
  const github = saveGithubConfig(config || getGithubConfig());
  const payload = {
    type: "painel-premium-github-config-backup",
    version: 1,
    createdAt: new Date().toISOString(),
    config: github
  };
  downloadLocalJsonFile("github-config-backup.json", payload);
  safeSetStorage(GITHUB_LAST_BACKUP_STORAGE_KEY, JSON.stringify(payload));
  return payload;
}

async function importBackupFromGithub(config) {
  if (config && typeof config === "object" && Object.keys(config).length) {
    return applyGithubConfigBackup({ config });
  }
  const parsed = await pickLocalJsonFile();
  return applyGithubConfigBackup(parsed);
}

async function exportLayoutBackupToGithub(layoutName, payload, config) {
  const github = saveGithubConfig(config || getGithubConfig());
  const targetPath = resolveGithubPathForTarget(layoutName, github);
  const finalPayload = { type: "painel-premium-layout-backup", layout: layoutName, version: 1, createdAt: new Date().toISOString(), data: payload };
  await githubApiRequest({ ...github, path: targetPath, method: "PUT", rawContent: JSON.stringify(finalPayload, null, 2), message: `Atualiza ${targetPath} pelo Painel Premium` });
  return finalPayload;
}

async function importLayoutBackupFromGithub(layoutName, config) {
  const github = saveGithubConfig(config || getGithubConfig());
  const targetPath = resolveGithubPathForTarget(layoutName, github);
  const data = await githubApiRequest({ ...github, path: targetPath, method: "GET" });
  const decoded = decodeBase64Utf8(String((data && data.content) || "").replace(/\n/g, ""));
  const parsed = JSON.parse(decoded);
  return parsed && typeof parsed === "object" && parsed.data !== undefined ? parsed.data : parsed;
}

function injectGithubBridge(html, layoutName) {
  if (!html || layoutName === "github" || layoutName === "gerador") return html;
  const bridgeScript = `
<script>
(function() {
  const layoutName = "__LAYOUT_NAME__";
  const api = window.parent && window.parent.__painelGithubApi;
  if (!api) return;
  const hasConfig = () => { try { return !!api.hasConfig(); } catch (err) { return false; } };
  const notify = (message, type) => {
    if (typeof showToast === "function") return showToast(message, type || "success");
    if (typeof toast === "function") return toast(message, type || "success");
  };

  if (layoutName === "protecao") {
    window.exportIDs = async function() {
      if (!hasConfig()) {
        notify("Configure o GitHub no painel primeiro.", "error");
        return false;
      }
      try {
        if (!window.data || !Object.keys(window.data).length) {
          notify("Nada para exportar", "error");
          return false;
        }
        await api.exportLayoutBackup(layoutName, window.data);
        notify("IDs exportados para o GitHub.", "success");
        return true;
      } catch (err) {
        notify((err && err.message) || "Falha ao exportar para o GitHub.", "error");
        return false;
      }
    };

    window.importClick = async function() {
      if (!hasConfig()) {
        notify("Configure o GitHub no painel primeiro.", "error");
        return false;
      }
      try {
        const payload = await api.importLayoutBackup(layoutName);
        if (!payload || typeof payload !== "object") throw new Error("Backup inválido");
        window.data = window.data || {};
        for (const k in window.data) delete window.data[k];
        for (const k in payload) if (Array.isArray(payload[k])) window.data[k] = payload[k].map(String);
        if (typeof saveData === "function") saveData();
        if (typeof update === "function") update();
        notify("IDs importados do GitHub.", "success");
        return true;
      } catch (err) {
        notify((err && err.message) || "Falha ao importar do GitHub.", "error");
        return false;
      }
    };
  }

  if (layoutName === "editor") {
    const originalImportLayout = typeof window.triggerLayoutImport === "function" ? window.triggerLayoutImport : null;
    window.exportConfig = async function() {
      if (!hasConfig()) {
        notify("Configure o GitHub no painel primeiro.", "error");
        return false;
      }
      try {
        const payload = typeof getConfigPayload === "function" ? getConfigPayload() : null;
        if (!payload || (!payload.importedLayout && !payload.obfuscatedScript && !payload.appName1 && !payload.appName2)) {
          notify("Nada para exportar ainda.", "error");
          return false;
        }
        await api.exportLayoutBackup(layoutName, payload);
        notify("Configuração exportada para o GitHub.", "success");
        return true;
      } catch (err) {
        notify((err && err.message) || "Falha ao exportar para o GitHub.", "error");
        return false;
      }
    };

    window.triggerConfigImport = async function() {
      if (!hasConfig()) {
        notify("Configure o GitHub no painel primeiro.", "error");
        return false;
      }
      try {
        const payload = await api.importLayoutBackup(layoutName);
        if (typeof applyConfig !== "function") throw new Error("applyConfig indisponível");
        applyConfig(payload);
        notify("Configuração importada do GitHub.", "success");
        return true;
      } catch (err) {
        notify((err && err.message) || "Falha ao importar do GitHub.", "error");
        return false;
      }
    };

    window.triggerLayoutImport = async function() {
      if (!hasConfig()) {
        notify("Configure o GitHub no painel primeiro.", "error");
        return false;
      }
      try {
        const content = await api.importTextFile("backup/app.html");
        if (typeof applyImportedLayoutContent !== "function") throw new Error("Importação de layout indisponível");
        applyImportedLayoutContent(content, "GitHub: backup/app.html");
        if (typeof hydrateFromImportedLayout === "function") hydrateFromImportedLayout();
        if (typeof saveConfig === "function") saveConfig();
        if (typeof updateGeneratedCode === "function") updateGeneratedCode();
        notify("Layout importado do GitHub.", "success");
        return true;
      } catch (err) {
        notify((err && err.message) || "Falha ao importar layout do GitHub.", "error");
        return false;
      }
    };
  }

  if (layoutName === "siteapk") {
    const bindButtons = function() {
      const exportBtn = document.getElementById("exportConfigBtn");
      const importBtn = document.getElementById("importConfigBtn");
      const importInput = document.getElementById("importConfigFile");

      if (exportBtn && !exportBtn.dataset.githubBound) {
        const newExportBtn = exportBtn.cloneNode(true);
        newExportBtn.dataset.githubBound = "1";
        exportBtn.parentNode.replaceChild(newExportBtn, exportBtn);
        newExportBtn.addEventListener("click", async function(event) {
          event.preventDefault();
          if (!hasConfig()) {
            notify("Configure o GitHub no painel primeiro.", "error");
            return false;
          }
          try {
            if (typeof getData !== "function") throw new Error("getData indisponível");
            await api.exportLayoutBackup(layoutName, getData());
            notify("Configuração exportada para o GitHub.", "success");
            return true;
          } catch (err) {
            notify((err && err.message) || "Falha ao exportar para o GitHub.", "error");
            return false;
          }
        });
      }

      if (importBtn && !importBtn.dataset.githubBound) {
        const newImportBtn = importBtn.cloneNode(true);
        newImportBtn.dataset.githubBound = "1";
        importBtn.parentNode.replaceChild(newImportBtn, importBtn);
        newImportBtn.addEventListener("click", async function(event) {
          event.preventDefault();
          if (importInput && typeof importInput.blur === "function") importInput.blur();
          if (!hasConfig()) {
            notify("Configure o GitHub no painel primeiro.", "error");
            return false;
          }
          try {
            const payload = await api.importLayoutBackup(layoutName);
            if (typeof importConfigFromObject !== "function") throw new Error("Importação indisponível");
            importConfigFromObject(payload);
            if (typeof saveLocalConfig === "function") saveLocalConfig();
            if (typeof updatePreview === "function") updatePreview();
            notify("Configuração importada do GitHub.", "success");
            return true;
          } catch (err) {
            notify((err && err.message) || "Falha ao importar do GitHub.", "error");
            return false;
          }

      }

      if (importInput && !importInput.dataset.githubBlocked) {
        importInput.dataset.githubBlocked = "1";
        importInput.addEventListener("click", function(event) {
          event.preventDefault();
          event.stopImmediatePropagation();
          notify("A importação local foi desativada. Use o GitHub.", "error");
          return false;
        }, true);

    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bindButtons, { once: true });
    } else {
      bindButtons();
    }
  }
})();
<\/script>`;
  const injection = bridgeScript.replace("__LAYOUT_NAME__", layoutName);
  const closeBodyIndex = html.toLowerCase().lastIndexOf("</body>");
  if (closeBodyIndex === -1) return html + injection;
  return html.slice(0, closeBodyIndex) + injection + html.slice(closeBodyIndex);
}

async function testGithubConnection(config) {
  const github = saveGithubConfig(config || getGithubConfig());
  const url = `https://api.github.com/repos/${encodeURIComponent(github.owner)}/${encodeURIComponent(github.repo)}`;
  const response = await fetch(url, {
    headers: { "Accept": "application/vnd.github+json", "Authorization": `Bearer ${github.token}`, "X-GitHub-Api-Version": "2022-11-28" },
    cache: "no-store"
  });
  const data = await response.json();
  if (!response.ok) throw new Error((data && (data.message || data.error)) || "Falha ao conectar no GitHub.");
  return data;
}

function injectRuntimeToastIntoHtml(sourceHtml, message) {
  const text = JSON.stringify(String(message || "Atualização concluída."));
  const script = '<script>(function(){try{var wrap=document.createElement("div");wrap.style.position="fixed";wrap.style.left="50%";wrap.style.bottom="22px";wrap.style.transform="translateX(-50%)";wrap.style.zIndex="99999";wrap.style.background="rgba(12,26,34,.96)";wrap.style.color="#fff";wrap.style.padding="12px 16px";wrap.style.borderRadius="14px";wrap.style.border="1px solid rgba(88,166,255,.18)";wrap.style.boxShadow="0 20px 45px rgba(0,0,0,.35)";wrap.style.fontFamily="Arial,Helvetica,sans-serif";wrap.style.fontSize="14px";wrap.textContent=' + text + ';document.addEventListener("DOMContentLoaded",function(){document.body.appendChild(wrap);setTimeout(function(){wrap.remove();},2600);});}catch(e){}})();<\/script>';
  const html = String(sourceHtml || "");
  const lower = html.toLowerCase();
  const index = lower.lastIndexOf("</body>");
  if (index >= 0) return html.slice(0, index) + script + html.slice(index);
  return html + script;
}

function applyPanelRuntimeHtml(html, successMessage) {
  if (!String(html || "").trim()) throw new Error("HTML inválido para atualização.");
  const finalHtml = injectRuntimeToastIntoHtml(String(html), successMessage || "Atualização concluída.");
  safeSetStorage(PANEL_RUNTIME_OVERRIDE_HTML_KEY, finalHtml);
  try { sessionStorage.setItem("__painel_runtime_loading_override__", "1"); } catch (err) {}
  document.open();
  document.write(finalHtml);
  document.close();
}

async function importLocalPanelFile(file) {
  if (!file) throw new Error("Selecione um arquivo HTML.");
  const html = await file.text();
  const normalized = String(html || "").trim();
  if (!normalized) throw new Error("Arquivo HTML inválido.");
  safeSetStorage("painel_updatepanel_imported_html_draft_v1", normalized);
  bumpPanelVersion();
  return { ok: true, version: getPanelVersion(), importedAt: new Date().toISOString() };
}

async function importGithubPanelIndex(config) {
  const github = saveGithubConfig(config || getGithubConfig());
  if (!github.token || !github.owner || !github.repo) {
    throw new Error("Configure o GitHub antes de atualizar o painel.");
  }
  const html = await importGithubTextFile("index.html", github);
  const nextVersion = bumpPanelVersion();
  applyPanelRuntimeHtml(html, `Atualização concluída. Painel v${nextVersion}`);
  return { ok: true, version: nextVersion };
}

function clearPanelRuntimeOverride() {
  safeRemoveStorage(PANEL_RUNTIME_OVERRIDE_HTML_KEY);
  try { sessionStorage.removeItem("__painel_runtime_loading_override__"); } catch (err) {}
}

window.__painelGithubApi = {
  getConfig() { return getGithubConfig(); },
  saveConfig(config) { return saveGithubConfig(config); },
  getBackupPreview() { return getGithubConfigBackup(); },
  test(config) { return testGithubConnection(config); },
  exportBackup(config) { return exportBackupToGithub(config); },
  importBackup(config) { return importBackupFromGithub(config); },
  hasConfig(config) { return hasGithubConfig(config); },
  exportLayoutBackup(layoutName, payload, config) { return exportLayoutBackupToGithub(layoutName, payload, config); },
  importLayoutBackup(layoutName, config) { return importLayoutBackupFromGithub(layoutName, config); },
  importTextFile(path, config) { return importGithubTextFile(path, config); }
};

window.__painelUpdateApi = {
  importLocalPanelFile(file) { return importLocalPanelFile(file); },
  importGithubPanelIndex(config) { return importGithubPanelIndex(config); },
  clearRuntimeOverride() { clearPanelRuntimeOverride(); }
};

const frame = document.getElementById("layoutFrame");
const screenTitle = document.getElementById("screenTitle");
const screenDesc = document.getElementById("screenDesc");
const navButtons = Array.from(document.querySelectorAll(".nav-btn"));
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const menuToggle = document.getElementById("menuToggle");
const reloadBtn = document.getElementById("reloadBtn");

updatePanelVersionLabel(getPanelVersion());

const layoutStorageKeys = {
  protecao: ["protections_ids"],
  editor: ["gerador_import_layout_config"],
  gerador: ["gerador_html_config"],
  siteapk: [],
  github: ["painel_github_config_v1", "painel_last_github_backup_v1"],
  updatepanel: ["painel_runtime_override_html_disabled", "painel_runtime_override_html_v1", "painel_updatepanel_imported_html_draft_v1"],
  profile: []
};

let currentLayout = "protecao";

function setActiveButton(name) {
  navButtons.forEach(btn => {
    btn.classList.toggle("active", btn.dataset.layout === name);
  });
}

function closeSidebar() {
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
}

function openSidebar() {
  sidebar.classList.add("open");
  overlay.classList.add("show");
}

function loadLayout(name) {
  const item = layouts[name];
  if (!item) return;

  currentLayout = name;
  screenTitle.textContent = item.title;
  screenDesc.textContent = item.desc;
  setActiveButton(name);

  function makeLayoutTransparent(html) {
  return html.replace(
    /<\/head>/i,
    `<style>
      html, body {
        background: transparent !important;
        background-image: none !important;
      }
    </style></head>`
  );
}

  frame.srcdoc = injectGithubBridge(makeLayoutTransparent(item.html), name);

  if (window.innerWidth <= 900) {
    closeSidebar();
  }
}

navButtons.forEach(btn => {
  btn.addEventListener("click", () => loadLayout(btn.dataset.layout));
});

menuToggle.addEventListener("click", () => {
  const opened = sidebar.classList.contains("open");
  if (opened) closeSidebar();
  else openSidebar();
});

overlay.addEventListener("click", closeSidebar);

reloadBtn.addEventListener("click", () => {
  const targetKeys = layoutStorageKeys[currentLayout] || [];
  let removedAny = false;

  try {
    targetKeys.forEach(key => {
      if (localStorage.getItem(key) !== null) {
        localStorage.removeItem(key);
        removedAny = true;
      }
    });
    if (currentLayout === "updatepanel") {
      clearPanelRuntimeOverride();
    }
  } catch (err) {
    console.error("Não foi possível limpar o cache do layout.", err);
  }

  if (removedAny) {
    alert("Cache do layout removido com sucesso.");
  } else if (targetKeys.length) {
    alert("O layout selecionado já estava sem cache.");
  } else {
    alert("Este layout não possui cache salvo para limpar.");
  }

  if (currentLayout === "updatepanel") {
    location.reload();
    return;
  }

  frame.srcdoc = "";
  setTimeout(() => loadLayout(currentLayout), 0);
});

const logoutBtn = document.getElementById("logoutBtn");

loginForm.addEventListener("submit", async event => {
  event.preventDefault();

  const username = loginUser.value.trim();
  const password = loginPass.value;

  const user = await validateCredentials(username, password);

  if (user) {
    safeSetStorage(AUTH_CONFIG.storageUserKey, user.username);
    await saveSession(user.username);
    authError.classList.remove("show");
    loginPass.value = "";
    showPanel();
    loadLayout(currentLayout);
    return;
  }

  authError.classList.add("show");
  loginPass.select();
});

logoutBtn.addEventListener("click", () => {
  clearSession();
  showLogin();
  authError.classList.remove("show");
  loginPass.value = "";
  setTimeout(() => loginUser.focus(), 50);
});

async function updateAdminPassword(currentPassword, newPassword) {
  const adminUser = findUser("Admin");
  if (!adminUser) {
    return { ok: false, message: "Usuário Admin não encontrado." };
  }

  const currentHash = await hashText(String(currentPassword || ""));
  if (currentHash !== adminUser.passwordHash) {
    return { ok: false, message: "A senha atual do Admin está incorreta." };
  }

  const nextPassword = String(newPassword || "");
  if (nextPassword.length < 4) {
    return { ok: false, message: "A nova senha precisa ter pelo menos 4 caracteres." };
  }

  adminUser.passwordHash = await hashText(nextPassword);
  persistAuthConfig();

  return {
    ok: true,
    message: "Senha atualizada com sucesso.",
    authConfigBase64: AUTH_CONFIG_BASE64
  };
}

window.__painelProfileApi = {
  getProfileData() {
    const adminUser = findUser("Admin");
    return {
      adminUsername: adminUser ? adminUser.username : "Admin",
      authConfigBase64: AUTH_CONFIG_BASE64
    };
  },
  changeAdminPassword: updateAdminPassword
};

async function bootstrapAuth() {
  if (await isAuthenticated()) {
    showPanel();
    loadLayout(currentLayout);
  } else {
    showLogin();
    setTimeout(() => loginUser.focus(), 50);
  }
}

bootstrapAuth();


function syncViewportHeight() {
  const root = document.documentElement;
  const vv = window.visualViewport;
  const height = vv ? vv.height : window.innerHeight;
  const width = vv ? vv.width : window.innerWidth;

  root.style.setProperty("--app-height", `${Math.max(320, Math.round(height))}px`);

  const compact = width <= 900;
  root.classList.toggle("is-compact", compact);
}

syncViewportHeight();
window.addEventListener("resize", syncViewportHeight, { passive: true });
window.addEventListener("orientationchange", syncViewportHeight, { passive: true });
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", syncViewportHeight, { passive: true });
  window.visualViewport.addEventListener("scroll", syncViewportHeight, { passive: true });
}

window.addEventListener("resize", () => {
  if (window.innerWidth > 900) {
    closeSidebar();
  }
});
</script>
